<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password - KIT's Stationary System</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="login-page">
    <nav class="navbar">
        <a href="index.html" class="logo">KIT's Stationary System</a>
        <div class="nav-links">
            <a href="index.html">Home</a>
            <a href="about.html">About</a>
            <a href="contact.html">Contact</a>
            <a href="signup.html">Sign Up</a>
            <a href="login.html">Login</a>
        </div>
    </nav>

    <div class="login-card">
        <h2>Reset Password</h2>
        <p style="text-align: center; color: var(--text-muted); margin-bottom: 2rem; font-size: 0.95rem;">
            Please enter your new password below.
        </p>
        
        <form id="resetPasswordForm">
            <div class="form-group">
                <label for="newPassword">New Password</label>
                <input type="password" id="newPassword" placeholder="••••••••" autocomplete="new-password" required minlength="6">
            </div>
            <div class="form-group">
                <label for="confirmPassword">Confirm Password</label>
                <input type="password" id="confirmPassword" placeholder="••••••••" autocomplete="new-password" required minlength="6">
            </div>
            
            <div id="reset-message" style="display: none; padding: 0.75rem; border-radius: var(--radius-sm); margin: 1rem 0; font-size: 0.9rem; text-align: center;">
            </div>

            <button type="submit" id="resetBtn" class="btn btn-primary" style="width: 100%; margin-top: 1rem;">Update Password</button>
            <p style="text-align: center; margin-top: 1.5rem; color: var(--text-muted); font-size: 0.9rem;">
                Back to <a href="login.html" style="color: var(--primary-color); font-weight: 600;">Login</a>
            </p>
        </form>
    </div>

    <footer style="width: 100%; margin-top: 5rem;">
        <div class="footer-content">
            <div class="logo" style="color: white;">KIT's Stationary System</div>
            <div class="footer-links">
                <a href="index.html">Home</a>
                <a href="about.html">About</a>
                <a href="contact.html">Contact</a>
                <a href="signup.html">Sign Up</a>
                <a href="login.html">Login</a>
            </div>
        </div>
        <div class="footer-bottom">
            <p>&copy; 2026 KIT's Stationary System. All Rights Reserved.</p>
        </div>
    </footer>

    <script src="reset_password.js"></script>
</body>
</html>
